# BasketTime – standardkonfiguration för Render
# Använd denna som utgångspunkt; du kan ändra plan/instans i Dashboard.

services:
  - type: web
    name: baskettime
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 2 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: baskettime-db
          property: connectionString

databases:
  - name: baskettime-db
    databaseName: baskettime
    user: baskettime
    plan: free
