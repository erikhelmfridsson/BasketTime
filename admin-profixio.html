<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin – Profixio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="view-mode-desktop">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-title">BasketTime</span>
        <span class="brand-subtitle">Admin</span>
      </div>
      <div class="topbar-actions">
        <a class="btn btn-outline btn-touch" href="/" rel="noopener">Till appen</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="panel">
      <h2>Profixio – daglig synk</h2>
      <p class="muted">
        Konfigurera vilka turneringar som ska synkas till appens databas. Synk körs en gång per dygn (om aktiverad i backend).
      </p>

      <div class="grid">
        <div class="grid-col">
          <label class="create-match-label" for="cfg-org">Organisation-ID (valfritt)</label>
          <input id="cfg-org" class="create-match-input" placeholder="t.ex. SVBF.SE.SVB" />
        </div>
        <div class="grid-col">
          <label class="create-match-label" for="cfg-tournament">Turnering-ID</label>
          <input id="cfg-tournament" class="create-match-input" placeholder="t.ex. 12345" />
        </div>
      </div>
      <div class="teams-actions-row">
        <button id="btn-add-config" class="btn btn-primary btn-touch">Lägg till/uppdatera</button>
        <button id="btn-refresh" class="btn btn-secondary btn-touch">Uppdatera lista</button>
      </div>
      <p id="admin-msg" class="settings-email-msg" role="status" hidden></p>

      <div class="panel-history">
        <h3>Konfiguration</h3>
        <div id="cfg-list" class="history-list" role="list"></div>
      </div>
    </section>
  </main>

  <script src="admin-profixio.js"></script>
</body>
</html>
