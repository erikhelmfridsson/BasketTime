<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2b5a8a">
  <title>BasketTime</title>
  <link rel="icon" type="image/png" href="assets/boll.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="view-mode-phone">
  <div class="login-screen" aria-labelledby="reset-title">
    <div class="login-screen-inner">
      <div class="login-card">
        <a href="./" class="login-logo-wrap" aria-label="BasketTime">
          <img src="assets/logo.png" alt="BasketTime" class="login-logo" width="240" height="80">
        </a>
        <h1 id="reset-title" class="login-title" data-i18n="reset.title">Nytt lösenord</h1>
        <p class="login-description" data-i18n="reset.hint">Ange ett nytt lösenord för ditt konto.</p>
        <form id="reset-form" class="login-form" novalidate>
          <label class="login-label" for="reset-password-input">
            <span data-i18n="reset.password">Nytt lösenord</span>
          </label>
          <input type="password" id="reset-password-input" class="login-input" autocomplete="new-password" data-i18n-placeholder="reset.passwordPlaceholder" placeholder="Minst 6 tecken" minlength="6" required aria-required="true">
          <p id="reset-msg" class="login-error" role="alert" hidden></p>
          <button type="submit" class="btn btn-primary btn-touch btn-full login-submit" data-i18n="reset.submit">Spara nytt lösenord</button>
          <p class="login-forgot-wrap">
            <a href="./" class="login-link" data-i18n="reset.backToLogin">Till inloggning</a>
          </p>
        </form>
      </div>
    </div>
  </div>
  <script src="i18n.js"></script>
  <script src="reset-password.js"></script>
</body>
</html>
